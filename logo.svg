<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 80" width="320" height="80">
  <!-- Fondo -->
  <rect width="320" height="80" fill="#0c0c0c" rx="12"/>

  <!-- Raqueta: cabeza oval -->
  <ellipse cx="42" cy="30" rx="22" ry="24" fill="rgba(45,212,191,0.10)" stroke="#2dd4bf" stroke-width="2.2"/>

  <!-- Grid interior de la raqueta (líneas) -->
  <line x1="42" y1="7"  x2="42" y2="53" stroke="#2dd4bf" stroke-width="1" opacity="0.25"/>
  <line x1="20" y1="30" x2="64" y2="30" stroke="#2dd4bf" stroke-width="1" opacity="0.25"/>
  <line x1="26" y1="13" x2="58" y2="47" stroke="#2dd4bf" stroke-width="1" opacity="0.18"/>
  <line x1="58" y1="13" x2="26" y2="47" stroke="#2dd4bf" stroke-width="1" opacity="0.18"/>

  <!-- Puntos (agujeros) de la raqueta -->
  <circle cx="42" cy="17" r="2.2" fill="#2dd4bf" opacity="0.9"/>
  <circle cx="33" cy="22" r="2.2" fill="#2dd4bf" opacity="0.9"/>
  <circle cx="51" cy="22" r="2.2" fill="#2dd4bf" opacity="0.9"/>
  <circle cx="30" cy="31" r="2.2" fill="#2dd4bf" opacity="0.9"/>
  <circle cx="42" cy="30" r="2.2" fill="#2dd4bf" opacity="0.9"/>
  <circle cx="54" cy="31" r="2.2" fill="#2dd4bf" opacity="0.9"/>
  <circle cx="35" cy="40" r="2.2" fill="#2dd4bf" opacity="0.9"/>
  <circle cx="49" cy="40" r="2.2" fill="#2dd4bf" opacity="0.9"/>

  <!-- Mango (handle) -->
  <rect x="39" y="53" width="6" height="2.5" fill="#2dd4bf" opacity="0.5"/>
  <rect x="37" y="55" width="10" height="18" rx="4" fill="#2dd4bf"/>
  <rect x="37" y="59" width="10" height="2"  rx="1" fill="rgba(0,0,0,0.25)"/>
  <rect x="37" y="63" width="10" height="2"  rx="1" fill="rgba(0,0,0,0.25)"/>
  <rect x="37" y="67" width="10" height="2"  rx="1" fill="rgba(0,0,0,0.25)"/>

  <!-- Texto principal -->
  <text x="80" y="38" font-family="Inter, Arial Black, sans-serif" font-size="30" font-weight="900" letter-spacing="-1" fill="white">Pádel<tspan fill="#2dd4bf">Pro</tspan>Guía</text>

  <!-- Subtexto -->
  <text x="82" y="57" font-family="Inter, Arial, sans-serif" font-size="10.5" font-weight="500" letter-spacing="3.5" fill="#666">GUÍA DE PALAS 2026</text>
</svg>
